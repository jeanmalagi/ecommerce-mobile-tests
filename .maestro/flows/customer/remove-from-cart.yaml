# Cenario: Cliente remove item do carrinho
appId: host.exp.exponent
---
- launchApp:
    clearState: true

- runFlow: ../_helpers/open-project-in-expo-go.yaml

- extendedWaitUntil:
    visible: "Bem-vindo de volta"
    timeout: 30000

- runFlow: ../_helpers/login-as-customer.yaml

- extendedWaitUntil:
    visible:
      id: "customer-products-title"
    timeout: 15000

- tapOn:
    id: "product-card"
    index: 0

- extendedWaitUntil:
    visible:
      id: "btn-add-to-cart"
    timeout: 15000

- runFlow:
    when:
      visible: "Sem estoque"
    commands:
      - back
      - tapOn:
          id: "product-card"
          index: 1
      - extendedWaitUntil:
          visible:
            id: "btn-add-to-cart"
          timeout: 15000

- runFlow:
    when:
      visible: "Sem estoque"
    commands:
      - back
      - tapOn:
          id: "product-card"
          index: 2
      - extendedWaitUntil:
          visible:
            id: "btn-add-to-cart"
          timeout: 15000

- assertVisible: "Adicionar ao carrinho"

- tapOn:
    id: "btn-add-to-cart"

- tapOn:
    id: "cart-success-ok"
    optional: true
- tapOn:
    text: "OK"
    optional: true

- runFlow:
    when:
      visible: "Erro"
    commands:
      - tapOn:
          text: "OK"
          optional: true

- runFlow:
    when:
      visible:
        id: "btn-add-to-cart"
    commands:
      - back

- extendedWaitUntil:
    visible:
      id: "customer-products-title"
    timeout: 45000

- assertVisible:
    id: "customer-products-title"

- extendedWaitUntil:
    visible: "Carrinho"
    timeout: 15000
- tapOn: "Carrinho"

- extendedWaitUntil:
    visible:
      id: "cart-total"
    timeout: 15000
- waitForAnimationToEnd

- tapOn:
    id: "cart-item-remove"
    index: 0
- assertVisible:
    id: "remove-modal-title"
- tapOn:
    id: "remove-modal-confirm"

- assertVisible:
    id: "cart-total"
