# Cenario: Cliente visualiza lista de produtos
appId: host.exp.exponent
---
- launchApp:
    clearState: true

- runFlow: ../_helpers/open-project-in-expo-go.yaml

- extendedWaitUntil:
    visible: "Bem-vindo de volta"
    timeout: 30000

- runFlow: ../_helpers/login-as-customer.yaml

- extendedWaitUntil:
    visible:
      id: "customer-products-title"
    timeout: 15000

- assertVisible:
    id: "customer-products-title"
- assertVisible:
    id: "customer-brand"
- assertVisible:
    id: "product-card"
