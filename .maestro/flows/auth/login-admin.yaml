# Cenario: Login com sucesso como administrador
appId: host.exp.exponent
---
- launchApp:
    clearState: true

- runFlow: ../_helpers/open-project-in-expo-go.yaml

- extendedWaitUntil:
    visible: "Bem-vindo de volta"
    timeout: 30000

- assertVisible: "Bem-vindo de volta"

- runFlow: ../_helpers/login-as-admin.yaml

- assertVisible:
    id: "admin-dashboard-title"
- assertVisible:
    id: "admin-metric-sales"
- assertVisible:
    id: "admin-metric-orders"
