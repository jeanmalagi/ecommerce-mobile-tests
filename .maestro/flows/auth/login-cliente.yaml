# Cenario: Login com sucesso como cliente
appId: host.exp.exponent
---
- launchApp:
    clearState: true

- runFlow: ../_helpers/open-project-in-expo-go.yaml

- extendedWaitUntil:
    visible: "Bem-vindo de volta"
    timeout: 60000

- assertVisible: "Bem-vindo de volta"

- runFlow: ../_helpers/login-as-customer.yaml

- assertVisible:
    id: "customer-products-title"
- assertVisible:
    id: "customer-brand"
